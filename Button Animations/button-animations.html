<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Button Animation Showcase</title>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #3b82f6;
            --secondary: #ec4899;
            --accent: #10b981;
        }

        body {
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 50px 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        .btn-box {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Common Button Reset */
        button {
            padding: 16px 32px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            background: none;
            transition: all 0.3s ease;
        }

        /* 1. THE LIQUID GLOW (High Interaction) */
        .btn-liquid {
            color: white;
            background: linear-gradient(45deg, #f06, #9f6ea3, #05c1ff, #f06);
            background-size: 400%;
            border-radius: 10px;
            z-index: 1;
        }
        .btn-liquid::before {
            content: "";
            position: absolute;
            inset: -4px;
            z-index: -1;
            background: inherit;
            background-size: inherit;
            filter: blur(15px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-liquid:hover {
            transform: scale(1.05);
            animation: moveGradient 8s linear infinite;
        }
        .btn-liquid:hover::before { opacity: 1; animation: moveGradient 8s linear infinite; }

        /* 2. THE NEON TRACER (Border Animation) */
        .btn-neon {
            color: var(--accent);
            border: 2px solid rgba(16, 185, 129, 0.3);
            overflow: hidden;
        }
        .btn-neon::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.4), transparent);
            transition: 0.5s;
        }
        .btn-neon:hover {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
        }
        .btn-neon:hover::after { left: 100%; }

        /* 3. THE SPLIT SHUTTER */
        .btn-split {
            color: #fff;
            border: 2px solid #fff;
        }
        .btn-split::before, .btn-split::after {
            content: '';
            position: absolute;
            width: 50%; height: 100%;
            background: #fff;
            z-index: -1;
            transition: 0.3s cubic-bezier(0.7, 0, 0.2, 1);
        }
        .btn-split::before { top: 0; left: -50%; }
        .btn-split::after { top: 0; right: -50%; }
        .btn-split:hover { color: var(--bg); }
        .btn-split:hover::before { left: 0; }
        .btn-split:hover::after { right: 0; }

        /* 4. THE GLASS MORPHISM (Tactile Floating) */
        .btn-glass {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
        }

        /* 5. THE PULSE RADAR */
        .btn-pulse {
            background: var(--primary);
            color: white;
            border-radius: 8px;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .btn-pulse:hover::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 2px solid var(--primary);
            animation: pulse-ring 1.2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        /* Shared Keyframes */
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Active click effect for all */
        button:active {
            transform: scale(0.95) !important;
        }
    </style>
</head>
<body>

    <h2 style="color: white; opacity: 0.7;">Interactive Button Suite</h2>

    <div class="container">
        <div class="btn-box">
            <button class="btn-liquid">Liquid Glow</button>
        </div>
        <div class="btn-box">
            <button class="btn-neon">Neon Tracer</button>
        </div>
        <div class="btn-box">
            <button class="btn-split">Split Shutter</button>
        </div>
        <div class="btn-box">
            <button class="btn-glass">Glass Float</button>
        </div>
        <div class="btn-box">
            <button class="btn-pulse">Radar Pulse</button>
        </div>
    </div>

</body>
</html>
